<!doctype html>
<html lang="hr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Elvora • Kamera</title>

<style>
:root{
--bg:#0b0f14;
--panel:#111827;
--border:#1f2937;
--text:#e5e7eb;
--muted:#9fb0c6;
--ok:#39d98a;
--blue:#19b5ff;
}

body{
margin:0;
background:var(--bg);
color:var(--text);
font-family:system-ui;
}

.wrap{
width:min(94vw,520px);
margin:auto;
padding:12px;
}

.stage{
position:relative;
border-radius:18px;
overflow:hidden;
border:1px solid var(--border);
background:#000;
}

video{
width:100%;
height:56vh;
object-fit:cover;
}

canvas{
position:absolute;
inset:0;
pointer-events:none;
}

.panel{
margin-top:12px;
padding:12px;
background:var(--panel);
border-radius:14px;
border:1px solid var(--border);
}

.row{
display:flex;
justify-content:space-between;
padding:8px 0;
border-bottom:1px solid rgba(255,255,255,.06);
}

.row:last-child{
border-bottom:0;
}

.k{
color:var(--muted);
}

.v{
font-weight:800;
}

.ean{
font-size:22px;
color:#9fe3ff;
}

.name{
font-size:20px;
}

.time{
font-size:18px;
}
</style>
</head>

<body>

<div class="wrap">

<div class="stage">
<video id="video" playsinline autoplay muted></video>
<canvas id="overlay"></canvas>
</div>

<div class="panel">

<div class="row">
<div class="k">Status</div>
<div id="st" class="v">SPREMNO</div>
</div>

<div class="row">
<div class="k">EAN</div>
<div id="code" class="v ean">—</div>
</div>

<div class="row">
<div class="k">Naziv</div>
<div id="name" class="v name">—</div>
</div>

<div class="row">
<div class="k">Skenirano</div>
<div id="when" class="v time">—</div>
</div>

</div>

</div>

<script src="/app/camera.js"></script>

</body>
</html>
