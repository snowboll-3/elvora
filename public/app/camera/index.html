<!doctype html>
<html lang="hr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Elvora • Kamera</title>
<meta name="theme-color" content="#0b0f14">
<style>
:root{--bg:#0b0f14;--panel:#111827;--border:#1f2937;--text:#e5e7eb;--muted:#9fb0c6;--ok:#39d98a;--blue:#19b5ff;--warn:#f0c24b;--bad:#ff5d5d;}
html,body{height:100%}
body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,Segoe UI,Roboto,Arial}
.wrap{width:min(94vw,520px);margin:12px auto;padding:12px}
.top{display:flex;align-items:center;justify-content:space-between;margin:6px 2px 10px}
.brand{font-weight:900;letter-spacing:.4px}
.badge{font-size:12px;color:var(--muted)}
.stage{position:relative;border-radius:18px;overflow:hidden;border:1px solid var(--border);background:#000}
video{width:100%;height:52vh;object-fit:cover;display:block;background:#000}
canvas#overlay{position:absolute;inset:0;pointer-events:none}
.tap{
  position:absolute;inset:0;display:flex;align-items:flex-end;justify-content:center;
  padding:14px;pointer-events:auto;
  background:linear-gradient(to top, rgba(11,15,20,.65), rgba(11,15,20,0) 55%);
}
#btnStart{
  width:100%;
  padding:12px 14px;border-radius:14px;border:0;
  background:var(--blue);color:#001018;font-weight:900;
}
#result{margin-top:12px;padding:12px;background:var(--panel);border:1px solid var(--border);border-radius:14px}
.row{display:flex;justify-content:space-between;gap:10px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.row:last-child{border-bottom:0}
.k{color:var(--muted)}
.v{font-weight:900}
.v.ok{color:var(--ok)} .v.bad{color:var(--bad)} .v.warn{color:var(--warn)}
.note{margin-top:10px;color:var(--muted);font-size:13px;line-height:1.35}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="brand">ELVORA</div>
    <div class="badge">Kamera • Skeniranje</div>
  </div>

  <div class="stage" id="stage">
    <video id="video" playsinline autoplay muted></video>
    <canvas id="overlay"></canvas>

    <!-- Jedna stvar: TAP / Pokreni -->
    <div class="tap" id="tapLayer">
      <button id="btnStart">Pokreni kameru</button>
    </div>
  </div>

  <div id="result">
    <div class="row"><div class="k">Status</div><div id="st" class="v warn">Spremno</div></div>
    <div class="row"><div class="k">EAN</div><div id="code" class="v">—</div></div>
    <div class="row"><div class="k">Naziv</div><div id="name" class="v">—</div></div>
    <div class="row"><div class="k">Skenirano</div><div id="when" class="v">—</div></div>
  </div>

  <div class="note" id="note">Tapni “Pokreni kameru”, zatim ciljaj barkod u zeleni okvir.</div>
</div>

<script>window.__ELVORA_ZXING_URL="https://unpkg.com/@zxing/browser@latest";</script>
<script src="/app/camera.js?v=cam_ui_v3"></script>
</body>
</html>
