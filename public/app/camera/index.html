<!doctype html>
<html lang="hr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Elvora — Kamera</title>
<style>
:root{
  --bg:#0b0f14;
  --panel:#111827;
  --border:#1f2937;
  --text:#e5e7eb;
  --muted:#9fb0c6;
  --ok:#39d98a;
  --blue:#19b5ff;
  --bad:#ff5d5d;
}
html,body{height:100%}
body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,Segoe UI,Roboto,Arial}
.wrapper{width:min(94vw,520px);margin:12px auto;padding:12px}
.stage{position:relative;border-radius:18px;overflow:hidden;border:1px solid var(--border);background:#000}
video{width:100%;height:52vh;object-fit:cover;display:block;background:#000}
canvas#overlay{position:absolute;inset:0;pointer-events:none}
.topbar{display:flex;align-items:center;justify-content:space-between;margin:6px 2px 10px}
.brand{font-weight:800;letter-spacing:.3px}
.badge{font-size:12px;color:var(--muted)}
#result{margin-top:12px;padding:12px;background:var(--panel);border:1px solid var(--border);border-radius:14px}
.row{display:flex;justify-content:space-between;gap:10px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.row:last-child{border-bottom:0}
.k{color:var(--muted)}
.v{font-weight:700}
.v.ok{color:var(--ok)}
.v.bad{color:var(--bad)}
.btn{
  width:100%;
  padding:12px 14px;
  border-radius:14px;
  border:0;
  font-weight:800;
  background:var(--blue);
  color:#001018;
}
#startBtn{display:none;margin-top:12px}
.note{margin-top:10px;color:var(--muted);font-size:13px}
</style>
</head>
<body>
<div class="wrapper">
  <div class="topbar">
    <div class="brand">ELVORA</div>
    <div class="badge">Kamera • Skeniranje</div>
  </div>

  <div class="stage">
    <video id="video" playsinline autoplay muted></video>
    <canvas id="overlay"></canvas>
  </div>

  <button id="startBtn" class="btn">Pokreni kameru</button>

  <div id="result">
    <div class="row"><div class="k">Status</div><div id="st" class="v ok">Spremno</div></div>
    <div class="row"><div class="k">Kod</div><div id="code" class="v">—</div></div>
    <div class="row"><div class="k">Naziv</div><div id="name" class="v">—</div></div>
    <div class="row"><div class="k">Vrijeme</div><div id="when" class="v">—</div></div>
  </div>

  <div class="note" id="note">Ciljaj barkod u okvir. Kamera se pokreće automatski.</div>
</div>

<script src="https://unpkg.com/@zxing/browser@latest"></script>`r`n<script src="/app/camera.js"></script>
</body>
</html>
