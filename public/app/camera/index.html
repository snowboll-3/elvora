<!doctype html>
<html lang="hr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Elvora — Kamera</title>
<style>
:root{
  --bg:#0b0f14;
  --panel:#111827;
  --border:#1f2937;
  --text:#e5e7eb;
  --muted:#9fb0c6;
  --ok:#39d98a;
  --blue:#19b5ff;
  --bad:#ff5d5d;
}
html,body{height:100%}
body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,Segoe UI,Roboto,Arial}
.wrapper{width:min(94vw,520px);margin:12px auto;padding:12px}
.stage{position:relative;border-radius:18px;overflow:hidden;border:1px solid var(--border);background:#000}
video{width:100%;height:52vh;object-fit:cover;display:block;background:#000}
canvas#overlay{position:absolute;inset:0;pointer-events:none}
.topbar{display:flex;align-items:center;justify-content:space-between;margin:6px 2px 10px}
.brand{font-weight:800;letter-spacing:.3px}
.badge{font-size:12px;color:var(--muted)}
#result{margin-top:12px;padding:12px;background:var(--panel);border:1px solid var(--border);border-radius:14px}
.row{display:flex;justify-content:space-between;gap:10px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.row:last-child{border-bottom:0}
.k{color:var(--muted)}
.v{font-weight:700}
.v.ok{color:var(--ok)}
.v.bad{color:var(--bad)}
.btn{
  width:100%;
  padding:12px 14px;
  border-radius:14px;
  border:0;
  font-weight:800;
  background:var(--blue);
  color:#001018;
}
#startBtn{display:none;margin-top:12px}
.note{margin-top:10px;color:var(--muted);font-size:13px}
</style>
</head>
<body>
<div class="wrapper">
  <div class="topbar">
    <div class="brand">ELVORA</div>
    <div class="badge">Kamera • Skeniranje</div>
  </div>

  <div class="stage">
    <video id="video" playsinline autoplay muted></video>
    <canvas id="overlay"></canvas>
  </div>

  <button id="startBtn" class="btn">Pokreni kameru</button>

  <div id="result">
    <div class="row"><div class="k">Status</div><div id="st" class="v ok">Spremno</div></div>
    <div class="row"><div class="k">Kod</div><div id="code" class="v">—</div></div>
    <div class="row"><div class="k">Naziv</div><div id="name" class="v">—</div></div>
    <div class="row"><div class="k">Vrijeme</div><div id="when" class="v">—</div></div>
  </div>

  <div class="note" id="note">Ciljaj barkod u okvir. Kamera se pokreće automatski.</div>
</div>

<script>
const video   = document.getElementById("video");
const overlay = document.getElementById("overlay");
const ctx     = overlay.getContext("2d");
const startBtn= document.getElementById("startBtn");

const stEl   = document.getElementById("st");
const codeEl = document.getElementById("code");
const nameEl = document.getElementById("name");
const whenEl = document.getElementById("when");
const noteEl = document.getElementById("note");

let lastCode=null, lastAt=0;
let detector = null;

function setStatus(msg, ok=true){
  stEl.textContent = msg;
  stEl.className = "v " + (ok ? "ok":"bad");
}

function resizeOverlay(){
  const r = video.getBoundingClientRect();
  overlay.width  = Math.max(1, Math.floor(r.width));
  overlay.height = Math.max(1, Math.floor(r.height));
}

function drawCorners(){
  ctx.clearRect(0,0,overlay.width,overlay.height);
  const w=overlay.width, h=overlay.height;
  const m=26, l=44;
  ctx.strokeStyle = "#39d98a";
  ctx.lineWidth = 4;

  // TL
  ctx.beginPath(); ctx.moveTo(m, m+l); ctx.lineTo(m, m); ctx.lineTo(m+l, m); ctx.stroke();
  // TR
  ctx.beginPath(); ctx.moveTo(w-m-l, m); ctx.lineTo(w-m, m); ctx.lineTo(w-m, m+l); ctx.stroke();
  // BL
  ctx.beginPath(); ctx.moveTo(m, h-m-l); ctx.lineTo(m, h-m); ctx.lineTo(m+l, h-m); ctx.stroke();
  // BR
  ctx.beginPath(); ctx.moveTo(w-m-l, h-m); ctx.lineTo(w-m, h-m); ctx.lineTo(w-m, h-m-l); ctx.stroke();

  requestAnimationFrame(drawCorners);
}

function beep(){
  try{
    const ac = new (window.AudioContext||window.webkitAudioContext)();
    const o = ac.createOscillator(); const g = ac.createGain();
    o.type="sine"; o.frequency.value=900;
    o.connect(g); g.connect(ac.destination);
    o.start(); g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime+0.12);
    setTimeout(()=>ac.close(),180);
  }catch(e){}
  if(navigator.vibrate) navigator.vibrate(60);
}

async function fetchProduct(ean){
  try{
    const r = await fetch(`https://world.openfoodfacts.org/api/v0/product/${encodeURIComponent(ean)}.json`, {cache:"no-store"});
    const j = await r.json();
    if(j && j.status===1 && j.product){
      return (j.product.product_name || j.product.generic_name || "Nepoznato").trim() || "Nepoznato";
    }
  }catch(e){}
  return "Nepoznato";
}

async function startCamera(){
  setStatus("Pokrećem…");
  noteEl.textContent = "Tražim dozvolu za kameru…";

  const stream = await navigator.mediaDevices.getUserMedia({
    video:{ facingMode:{ideal:"environment"} },
    audio:false
  });

  video.srcObject = stream;
  await video.play();

  resizeOverlay();
  drawCorners();

  setStatus("Spremno", true);
  noteEl.textContent = "Ciljaj barkod u okvir.";
}

async function scanOnce(){
  if(!detector) return;
  if(video.readyState !== 4) return;

  try{
    const codes = await detector.detect(video);
    if(codes && codes.length){
      const code = (codes[0].rawValue||"").trim();
      const now = performance.now();
      if(code && (code!==lastCode || (now-lastAt)>1500)){
        lastCode=code; lastAt=now;

        beep();
        codeEl.textContent = code;
        whenEl.textContent = new Date().toLocaleString("hr-HR");
        setStatus("Očitano", true);

        nameEl.textContent = "Tražim naziv…";
        const name = await fetchProduct(code);
        nameEl.textContent = name;
      }
    }
  }catch(e){
    // ignore
  }
}

function loop(){
  scanOnce().finally(()=>requestAnimationFrame(loop));
}

function showStartButton(reason){
  setStatus(reason || "Potrebna akcija", false);
  noteEl.textContent = "Klikni 'Pokreni kameru' (browser traži potvrdu).";
  startBtn.style.display = "block";
}

async function autoStart(){
  if(!('mediaDevices' in navigator) || !('getUserMedia' in navigator.mediaDevices)){
    showStartButton("Kamera nije podržana");
    return;
  }

  if("BarcodeDetector" in window){
    detector = new BarcodeDetector({formats:["ean_13","ean_8","upc_a","upc_e","code_128","qr_code"]});
  }else{
    showStartButton("Nema BarcodeDetector");
    return;
  }

  try{
    await startCamera();
    startBtn.style.display = "none";
    loop();
  }catch(e){
    const name = (e && e.name) ? e.name : "";
    const msg  = (e && (e.message||e.name)) ? (e.message||e.name) : "Dozvola za kameru";

    // Samo permission/user-gesture -> pokaži gumb kao fallback
    if(name==="NotAllowedError" || name==="SecurityError"){
      showStartButton(name + ": " + msg);
      return;
    }

    // Sve ostalo -> retry automatski bez gumba
    setStatus(name ? (name + ": " + msg) : msg, false);
    noteEl.textContent = "Pokušavam ponovno…";
    startBtn.style.display = "none";
    setTimeout(autoStart, 900);
  }
}

startBtn.addEventListener("click", async ()=>{
  startBtn.style.display="none";
  await autoStart();
});

// AUTO: startaj odmah
window.addEventListener("load", autoStart);
window.addEventListener("resize", resizeOverlay);

// Safety: kad tab ode u background, ugasi stream (štedi bateriju)
document.addEventListener("visibilitychange", ()=>{
  if(document.hidden){
    try{
      const s = video.srcObject;
      if(s && s.getTracks) s.getTracks().forEach(t=>t.stop());
    }catch(e){}
  }
});
</script>
</body>
</html>
