<!doctype html>
<html lang="hr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Elvora • Kamera</title>
  <meta name="theme-color" content="#0b0f14">
  <style>
    :root{
      --bg:#0b0f14; --panel:#111827; --border:#1f2937;
      --text:#e5e7eb; --muted:#9fb0c6;
      --ok:#39d98a; --blue:#19b5ff; --warn:#f0c24b; --bad:#ff5d5d;
    }
    html,body{height:100%}
    body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,Segoe UI,Roboto,Arial}
    .wrap{width:min(94vw,560px);margin:12px auto;padding:12px}
    .top{display:flex;align-items:center;justify-content:space-between;margin:4px 2px 10px}
    .brand{font-weight:900;letter-spacing:.4px}
    .pill{font-size:12px;color:var(--muted);padding:6px 10px;border:1px solid var(--border);border-radius:999px;background:rgba(255,255,255,.03)}
    .stage{position:relative;border-radius:18px;overflow:hidden;border:1px solid var(--border);background:#000}
    video{width:100%;height:56vh;object-fit:cover;display:block;background:#000}
    canvas{position:absolute;inset:0;pointer-events:none}
    .hud{display:flex;gap:8px;flex-wrap:wrap;margin:10px 2px}
    .btn{
      padding:10px 12px;border-radius:14px;border:1px solid var(--border);
      background:rgba(255,255,255,.04);color:var(--text);font-weight:800
    }
    .btn.primary{background:var(--blue);border-color:transparent;color:#001018}
    .btn.danger{background:rgba(255,93,93,.12);border-color:rgba(255,93,93,.35)}
    .btn:disabled{opacity:.5}
    #panel{margin-top:10px;padding:12px;background:var(--panel);border:1px solid var(--border);border-radius:14px}
    .row{display:flex;justify-content:space-between;gap:10px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.06)}
    .row:last-child{border-bottom:0}
    .k{color:var(--muted)}
    .v{font-weight:900}
    .v.ok{color:var(--ok)} .v.bad{color:var(--bad)} .v.warn{color:var(--warn)}
    #hint{margin-top:10px;color:var(--muted);font-size:13px;line-height:1.35}
    #toast{margin-top:10px;font-size:12px;color:var(--muted)}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="brand">ELVORA</div>
      <div class="pill">Kamera • V1</div>
    </div>

    <div class="stage">
      <video id="video" playsinline autoplay muted></video>
      <canvas id="overlay"></canvas>
    </div>

    <div class="hud">
      <button id="btnStart" class="btn primary">Pokreni</button>
      <button id="btnStop" class="btn danger" disabled>Zaustavi</button>
      <button id="btnSwitch" class="btn" disabled>Promijeni kameru</button>
      <button id="btnTorch" class="btn" disabled>Svjetlo</button>
      <button id="btnSound" class="btn">Zvuk: ON</button>
    </div>

    <div id="panel">
      <div class="row"><div class="k">Status</div><div id="st" class="v warn">Spremno</div></div>
      <div class="row"><div class="k">Kod</div><div id="code" class="v">—</div></div>
      <div class="row"><div class="k">Naziv</div><div id="name" class="v">—</div></div>
      <div class="row"><div class="k">Vrijeme</div><div id="when" class="v">—</div></div>
    </div>

    <div id="hint">Ciljaj barkod u sredinu. Ako nema naziva: prikazujemo EAN i ponudimo unos naziva.</div>
    <div id="toast"></div>
  </div>

  <!-- ZXing fallback (učita se samo ako BarcodeDetector ne postoji) -->
  <script>
    window.__ELVORA_ZXING_URL = "https://unpkg.com/@zxing/browser@latest";
  </script>
  <script src="/app/camera.js?v=cam_v1"></script>
</body>
</html>
